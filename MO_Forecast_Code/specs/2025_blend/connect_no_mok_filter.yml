mode: "no_mok_filter"
input_rds: "Monsoon_Data/Processed_Data/Combined/combine_template_no_mok_filter_2025_combined_wide.rds"
output_rds: "Monsoon_Data/Processed_Data/2025_pipeline_input/cv_data_no_mok_filter_new_pipeline.rds"
day_max: 28
days_per_week: 7
n_weeks: 4

climatology:
  base_prefix: "clim"
  unconditional_prefix: "clim_unc"
  window_tags: []

forecast_models:
  - name: ngcm
    variants: [clim_mok_date]
    rain_predictors: [diff_5day, min_10day]
  - name: aifs
    variants: [clim_mok_date]
    rain_predictors: [diff_5day, min_10day, max_5day]
