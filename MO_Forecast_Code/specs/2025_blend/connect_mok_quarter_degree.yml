mode: "mok"
input_rds: "Monsoon_Data/Processed_Data/Combined/combine_template_quarter_degree_2025_combined_wide.rds"
output_rds: "Monsoon_Data/Processed_Data/2025_pipeline_input/cv_data_quarter_degree_new_pipeline.rds"
day_max: 28
days_per_week: 7
n_weeks: 4

climatology:
  base_prefix: "clim"
  unconditional_prefix: "clim_unc"
  window_tags: ["2000_2024", "1990_2024", "1980_2024", "1970_2024", "1960_2024",
                "1950_2024", "1940_2024", "1930_2024", "1920_2024", "1910_2024"]

forecast_models:
  - name: ngcm
    variants: [clim_mok_date]
    rain_predictors: [diff_5day, min_10day]
  - name: aifs
    variants: [clim_mok_date]
    rain_predictors: [diff_5day, min_10day, max_5day]
